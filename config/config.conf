#!/bin/bash
# ==========================================
# OXGI VPS Script - Configuration File
# ==========================================

# Domain
if [[ -f /etc/oxgi/domain.conf ]]; then
    DOMAIN=$(cat /etc/oxgi/domain.conf)
else
    DOMAIN=""
fi

# SSH Configuration
SSH_PORT="22"
DROPBEAR_PORT_1="109"
DROPBEAR_PORT_2="143"

# WebSocket Configuration
WS_HTTP_PORT="80"
WS_HTTPS_PORT="443"
WS_BACKEND_PORT="2090"

# Stunnel Configuration
STUNNEL_PORT_1="447"
STUNNEL_PORT_2="777"

# BadVPN Configuration
BADVPN_PORT_1="7100"
BADVPN_PORT_2="7200"
BADVPN_PORT_3="7300"

# Nginx Configuration
NGINX_VPS_PORT="81"

# Xray Configuration
XRAY_VMESS_PORT_GRPC="443"
XRAY_VMESS_PORT_TLS="443"
XRAY_VMESS_PORT_NONE_TLS="80"
XRAY_VLESS_PORT_GRPC="443"
XRAY_VLESS_PORT_TLS="443"
XRAY_VLESS_PORT_NONE_TLS="80"
XRAY_TROJAN_PORT_GRPC="443"
XRAY_TROJAN_PORT_GO="443"
XRAY_TROJAN_PORT_WS="443"
XRAY_SODOSOK_PORT_WS="443"
XRAY_SODOSOK_PORT_GRPC="443"

# Xray Internal Ports
XRAY_VMESS_INTERNAL="10000"
XRAY_VLESS_INTERNAL="10001"
XRAY_TROJAN_INTERNAL="10002"
XRAY_SODOSOK_INTERNAL="10003"

# SSL Configuration
SSL_DIR="/etc/letsencrypt"
SSL_CERT="${SSL_DIR}/live/${DOMAIN}/fullchain.pem"
SSL_KEY="${SSL_DIR}/live/${DOMAIN}/privkey.pem"

# Paths
OXGI_DIR="/usr/local/oxgi"
CONFIG_DIR="/etc/oxgi"
LOG_DIR="/var/log/oxgi"
DATABASE_DIR="/etc/oxgi/database"

# Application Info
APP_NAME="OXGI VPS Script"
VERSION="2.0.0"
AUTHOR="gitechcode-star"

# Colors
RED='\033[0;31m'
GREEN='\033[0;32m'
YELLOW='\033[1;33m'
BLUE='\033[0;34m'
PURPLE='\033[0;35m'
CYAN='\033[0;36m'
LIGHT='\033[0;37m'
BOLD='\033[1m'
UNDERLINE='\033[4m'
NC='\033[0m'

# Status Messages
EROR="[${RED} EROR ${NC}]"
INFO="[${YELLOW} INFO ${NC}]"
OKEY="[${GREEN} OKEY ${NC}]"
PENDING="[${YELLOW} PENDING ${NC}]"
