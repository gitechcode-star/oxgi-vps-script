#!/bin/bash
# ==========================================
# OXGI VPS Script - Configuration File
# ==========================================

# Domain Configuration
DOMAIN="s.xcloud.fun"
EMAIL="admin@${DOMAIN}"

# Ports Configuration
SSH_PORT="22"
SSH_PORT_ALT="3303"
HTTP_PORT="80"
HTTPS_PORT="443"
WS_PORT="700"
PROXY_PORT="8080"
DROPBEAR_PORT="444"
BADVPN_PORT="7300"
NGINX_PORT="443"

# XRay Ports
VLESS_PORT="8443"
VMESS_PORT="8080"
TROJAN_PORT="2083"
SS_PORT="8388"

# Features
ENABLE_VLESS="true"
ENABLE_VMESS="true"
ENABLE_TROJAN="true"
ENABLE_SS="false"

# SSL Configuration
SSL_ENABLED="true"
NGINX_ENABLED="true"
SSL_DIR="/etc/letsencrypt"
SSL_CERT="${SSL_DIR}/live/${DOMAIN}/fullchain.pem"
SSL_KEY="${SSL_DIR}/live/${DOMAIN}/privkey.pem"

# Paths
OXGI_DIR="/usr/local/oxgi"
CONFIG_DIR="/etc/oxgi"
LOG_DIR="/var/log/oxgi"

# Colors
RED='\033[0;31m'
GREEN='\033[0;32m'
YELLOW='\033[1;33m'
BLUE='\033[0;34m'
CYAN='\033[0;36m'
NC='\033[0m'
